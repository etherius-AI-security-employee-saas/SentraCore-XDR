version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sentracore_xdr
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  ai-engine:
    build:
      context: ..
      dockerfile: infra/docker/ai-engine.Dockerfile
    ports:
      - "8001:8001"

  gateway:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/sentracore_xdr
      REDIS_URL: redis://redis:6379/0
      AI_ENGINE_URL: http://ai-engine:8001
    depends_on:
      - postgres
      - redis
      - ai-engine
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    depends_on:
      - gateway
    ports:
      - "8080:80"

volumes:
  postgres_data:
